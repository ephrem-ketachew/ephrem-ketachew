name: Generate Metrics & Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the repository
      - uses: actions/checkout@v3

      # 2. Generate the snake SVG
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # 3. Create folder & Download the LeetCode SVG
      - name: Fetch Live LeetCode Stats
        run: |
          mkdir -p dist
          curl -L "https://leetcard.jacoblin.cool/ephrem-ketachew?theme=dark&font=Syne&ext=activity" -o dist/leetcode.svg
          
      # 4. Push BOTH images to the "output" branch
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
